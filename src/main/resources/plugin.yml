name: BlueMapWebChat
version: 4.5.4
main: dev.kokoto.bluemapwebchat.BlueMapWebChatPlugin
api-version: '1.21'
authors: [KOKOTO]
description: Standalone BlueMap web chat addon with guest chat, account linking, moderation, and optional captcha.
softdepend: [DiscordSRV]
loadbefore: [ImageEmojis]
commands:
  bmchat:
    description: BlueMapWebChat command
    usage: /bmchat <auth|password|dm|group|reload|admin>
    aliases: [bluemapchat, bmc]
permissions:
  bluemapwebchat.auth:
    description: Allows linking a web account to a Minecraft account.
    default: true
  bluemapwebchat.webchat:
    description: Allows using authenticated web chat.
    default: true
  bluemapwebchat.admin:
    description: Allows administrating BlueMapWebChat.
    default: op

  bluemapwebchat.dm:
    description: Allows sending and reading BlueMapWebChat direct messages.
    default: true

  bluemapwebchat.group:
    description: Allows sending and reading BlueMapWebChat group messages.
    default: true
