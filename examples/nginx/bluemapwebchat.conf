# BlueMapWebChat + BlueMap HTTPS reverse proxy example for nginx.
# Replace map.example.com and certificate paths before use.
# Install notes: see examples/nginx/INSTALL.md and docs/NGINX_HTTPS_EN.md.
# nginx needs a TLS certificate; Certbot is the usual Let's Encrypt option.

server {
    listen 80;
    server_name map.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name map.example.com;

    ssl_certificate     /etc/letsencrypt/live/map.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/map.example.com/privkey.pem;

    # BlueMapWebChat API, uploads, SSE, and standalone page.
    # The trailing slash in proxy_pass strips /bmwc/ before forwarding,
    # so /bmwc/api/config becomes /api/config and /bmwc/chat becomes /chat.
    location /bmwc/ {
        proxy_pass http://127.0.0.1:8899/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Important for Server-Sent Events reconnect/streaming behavior.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # BlueMap web server.
    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}
