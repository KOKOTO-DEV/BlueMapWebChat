# Minimal BlueMapWebChat overrides when publishing through nginx at https://map.example.com/bmwc/.
# Merge these values into plugins/BlueMapWebChat/config.yml.

http:
  host: "127.0.0.1"
  port: 8899
  path-prefix: "/api"
  cors-origin: "https://map.example.com"

standalone-web:
  enabled: true
  path: "/chat"
  # Usually empty when it shares web-addon.api-base-url.
  # Empty follows web-addon.api-base-url. You may also set "/bmwc/api" explicitly.
  # Relative values without leading / use http.cors-origin when it is a real origin.
  api-base-url: ""

web-addon:
  api-base-url: "/bmwc/api"

upload:
  # Recommended: empty; uploads follow web-addon.api-base-url + /uploads.
  # Explicit forms also work: "/bmwc/api" or "/bmwc/api/uploads".
  # Relative values without leading / use http.cors-origin when it is a real origin.
  public-base-url: ""

emoji:
  # Recommended: empty; emoji files follow web-addon.api-base-url + /emojis.
  # Explicit forms also work: "/bmwc/api" or "/bmwc/api/emojis".
  # Relative values without leading / use http.cors-origin when it is a real origin.
  public-base-url: ""

# Keep media preview max-height enabled for scroll stability.
# Recommended: 640-720. 0 means unlimited and may cause scroll jumps.
ui:
  image-preview-max-height: 720
